<section class="listing">
  <img class="listing-photo"
    [src]="pokemons.photo"
    alt="Pokemon {{pokemons.nombre}}"
    crossorigin/>

  <h2 class="listing-heading">{{ pokemons.nombre }}</h2>
  <p class="listing-type">{{ pokemons.tipo }} — {{ pokemons.description }}</p>
  <a [routerLink]="['/details', pokemons.nombre]" routerLinkActive="router-link-active">Ver detalles</a>
</section>
