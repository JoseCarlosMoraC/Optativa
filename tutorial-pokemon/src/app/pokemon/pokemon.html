<section>
  <div class="header-section">
    <form>
      <input type="text" placeholder="Buscar pokémon..." #filter>
      <button class="primary" type="button" (click)="onsearch(filter.value)">Buscar</button>
    </form>
    <button class="btn-create" routerLink="/create">Añadir Pokémon</button>
  </div>

  <section class="results">
    <app-pokemons
      *ngFor="let pokemons of filteredpokemonslista"
      [pokemons]="pokemons">
    </app-pokemons>
  </section>
</section>
